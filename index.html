<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .calculator {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }

        /* Header with install button */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .app-status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        #installButton {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(33, 150, 243, 0.3);
            transition: all 0.2s;
        }

        #installButton:hover {
            background: #1976d2;
            transform: translateY(-2px);
        }

        #installButton:active {
            transform: translateY(0);
        }

        #installButton.hidden {
            display: none;
        }

        .install-icon {
            font-size: 18px;
        }

        #installMessage {
            text-align: center;
            margin: 10px 0;
            padding: 8px;
            border-radius: 8px;
            background: #fff3cd;
            color: #856404;
            font-size: 13px;
            display: none;
        }

        #installMessage.show {
            display: block;
        }

        /* Display */
        .display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 120px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        #expression {
            color: #6c757d;
            font-size: 16px;
            min-height: 24px;
            word-wrap: break-word;
            margin-bottom: 8px;
        }

        #result {
            color: #212529;
            font-size: 48px;
            font-weight: 300;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* Buttons */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px 10px;
            font-size: 24px;
            border: none;
            border-radius: 16px;
            background: #f8f9fa;
            color: #212529;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 400;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.95);
            background: #e9ecef;
        }

        .operator {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: 600;
        }

        .operator:active {
            background: #bbdefb;
        }

        .equals {
            background: #2196f3;
            color: white;
            grid-column: span 2;
            font-weight: 600;
        }

        .equals:active {
            background: #1976d2;
        }

        .clear {
            background: #ffebee;
            color: #c62828;
            font-weight: 600;
        }

        .clear:active {
            background: #ffcdd2;
        }

        .zero {
            grid-column: span 2;
        }

        /* Keyboard shortcut hint */
        .shortcut-hint {
            margin-top: 16px;
            text-align: center;
            color: #adb5bd;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Header with install button -->
        <div class="header">
            <span class="app-title">Calculator</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="app-status" id="appStatus">Web App</span>
                <button id="installButton">
                    <span class="install-icon">📲</span>
                    Install
                </button>
            </div>
        </div>
        
        <div id="installMessage"></div>

        <!-- Display -->
        <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="toggleSign()">±</button>
            <button class="operator" onclick="percent()">%</button>
            <button class="operator" onclick="addOperator('÷')">÷</button>
            
            <button onclick="addNumber('7')">7</button>
            <button onclick="addNumber('8')">8</button>
            <button onclick="addNumber('9')">9</button>
            <button class="operator" onclick="addOperator('×')">×</button>
            
            <button onclick="addNumber('4')">4</button>
            <button onclick="addNumber('5')">5</button>
            <button onclick="addNumber('6')">6</button>
            <button class="operator" onclick="addOperator('−')">−</button>
            
            <button onclick="addNumber('1')">1</button>
            <button onclick="addNumber('2')">2</button>
            <button onclick="addNumber('3')">3</button>
            <button class="operator" onclick="addOperator('+')">+</button>
            
            <button class="zero" onclick="addNumber('0')">0</button>
            <button onclick="addDecimal()">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>

        <div class="shortcut-hint">
            Press C to clear · Works offline
        </div>
    </div>

    <script>
        // Calculator logic
        let currentInput = '';
        let previousInput = '';
        let operation = null;
        let shouldResetScreen = false;

        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        const appStatus = document.getElementById('appStatus');

        // Update display
        function updateDisplay() {
            resultEl.textContent = currentInput || '0';
            
            if (previousInput && operation) {
                expressionEl.textContent = `${previousInput} ${operation} ${currentInput || ''}`;
            } else if (previousInput && !operation) {
                expressionEl.textContent = previousInput;
            } else {
                expressionEl.textContent = '';
            }
        }

        // Add number
        function addNumber(num) {
            if (currentInput.length >= 12) return;
            
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = num;
                shouldResetScreen = false;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        // Add decimal
        function addDecimal() {
            if (shouldResetScreen) {
                currentInput = '0.';
                shouldResetScreen = false;
                updateDisplay();
                return;
            }
            
            if (!currentInput.includes('.')) {
                currentInput = currentInput ? currentInput + '.' : '0.';
                updateDisplay();
            }
        }

        // Add operator
        function addOperator(op) {
            if (currentInput === 'Error') {
                clearAll();
            }
            
            if (previousInput && operation && currentInput) {
                calculate();
            }
            
            if (currentInput) {
                previousInput = currentInput;
                operation = op;
                currentInput = '';
                shouldResetScreen = false;
            } else if (previousInput) {
                operation = op;
            }
            updateDisplay();
        }

        // Calculate result
        function calculate() {
            if (!previousInput || !currentInput || !operation) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            
            switch(operation) {
                case '+': result = prev + curr; break;
                case '−': result = prev - curr; break;
                case '×': result = prev * curr; break;
                case '÷': 
                    if (curr === 0) {
                        result = 'Error';
                    } else {
                        result = prev / curr;
                    }
                    break;
                default: return;
            }
            
            if (result === 'Error') {
                currentInput = 'Error';
                previousInput = '';
                operation = null;
            } else {
                // Limit decimal places
                if (result.toString().includes('.')) {
                    result = parseFloat(result.toFixed(10));
                }
                currentInput = result.toString();
                previousInput = '';
                operation = null;
                shouldResetScreen = true;
            }
            updateDisplay();
        }

        // Clear all
        function clearAll() {
            currentInput = '';
            previousInput = '';
            operation = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        // Toggle sign
        function toggleSign() {
            if (currentInput && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        // Percent
        function percent() {
            if (currentInput && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNumber(e.key);
            if (e.key === '.') addDecimal();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                e.preventDefault();
                let op = e.key;
                if (op === '*') op = '×';
                if (op === '/') op = '÷';
                addOperator(op);
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            }
            if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearAll();
            }
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (currentInput && currentInput !== 'Error') {
                    currentInput = currentInput.slice(0, -1);
                    updateDisplay();
                }
            }
        });

        // PWA Installation
        let deferredPrompt;
        const installButton = document.getElementById('installButton');
        const installMessage = document.getElementById('installMessage');

        // Check if running as installed app
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
            appStatus.textContent = 'Installed ✓';
            installButton.classList.add('hidden');
        }

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Only show if not already installed
            if (!window.matchMedia('(display-mode: standalone)').matches && 
                !window.navigator.standalone) {
                installButton.classList.remove('hidden');
            }
        });

        // Handle install button click
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) {
                installMessage.textContent = 'Already installed or not supported';
                installMessage.classList.add('show');
                setTimeout(() => installMessage.classList.remove('show'), 3000);
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                installMessage.textContent = '✓ Installing...';
                installMessage.classList.add('show');
                installButton.classList.add('hidden');
            } else {
                installMessage.textContent = 'Installation cancelled';
                installMessage.classList.add('show');
                setTimeout(() => installMessage.classList.remove('show'), 3000);
            }
            
            deferredPrompt = null;
        });

        // Handle successful install
        window.addEventListener('appinstalled', () => {
            appStatus.textContent = 'Installed ✓';
            installButton.classList.add('hidden');
            installMessage.textContent = '✓ App installed successfully!';
            installMessage.classList.add('show');
            setTimeout(() => installMessage.classList.remove('show'), 3000);
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.log('❌ Service Worker error:', err));
            });
        }
    </script>
</body>
</html>
