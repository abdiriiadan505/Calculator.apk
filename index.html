<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Calculator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e222e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PWA Calc">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #2c3e50, #1a2634);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .calculator {
            background: #1e222e;
            border-radius: 36px;
            padding: 24px 20px 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
            width: 360px;
            max-width: 100%;
        }

        /* Install button */
        .install-container {
            margin-bottom: 16px;
        }

        #installButton {
            background: linear-gradient(145deg, #2f80ed, #1a5bbf);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f2b4f, 0 6px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #installButton:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f2b4f, 0 8px 15px rgba(0,0,0,0.4);
        }

        #installButton.hidden {
            display: none;
        }

        .install-icon {
            font-size: 1.3rem;
        }

        .install-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        #installStatus {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 8px;
            color: #9aa5b8;
            min-height: 20px;
        }

        /* Display */
        .display {
            background: #272c3b;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            text-align: right;
            box-shadow: inset 0 4px 6px #0f111a;
        }

        .expression {
            color: #8592b0;
            font-size: 1rem;
            min-height: 1.6rem;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
        }

        .result {
            color: #f2f5fa;
            font-size: 2.8rem;
            font-weight: 600;
            line-height: 1.2;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
            text-shadow: 0 3px 3px black;
        }

        /* Buttons grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            background: #303649;
            border: none;
            border-radius: 20px;
            padding: 18px 0;
            font-size: 1.6rem;
            font-weight: 500;
            color: #dfe6f0;
            box-shadow: 0 4px 0 #1b1f2b, 0 6px 12px rgba(0,0,0,0.4);
            transition: 0.07s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1b1f2b, 0 8px 12px rgba(0,0,0,0.5);
        }

        .operator {
            background: #42536b;
            color: #ffd97c;
            font-size: 1.8rem;
        }

        .equals {
            background: #f2b343;
            color: #1e1e2a;
            box-shadow: 0 4px 0 #9e701f;
            font-size: 2rem;
            font-weight: 700;
        }

        .clear {
            background: #3f3f5e;
            color: #ffb5b5;
        }

        .zero {
            grid-column: span 2;
        }

        @media (max-width: 400px) {
            .calculator { padding: 16px; }
            .btn { padding: 16px 0; font-size: 1.4rem; }
            .result { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Installation section -->
        <div class="install-container">
            <button id="installButton" class="hidden">
                <span class="install-icon">📲</span>
                <span>Install Calculator</span>
                <span class="install-badge">PWA</span>
            </button>
            <div id="installStatus"></div>
        </div>

        <!-- Display -->
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <!-- Keypad -->
        <div class="buttons">
            <button class="btn clear" data-action="clear">C</button>
            <button class="btn operator" data-action="sign">±</button>
            <button class="btn operator" data-action="percent">%</button>
            <button class="btn operator" data-action="operator">÷</button>

            <button class="btn" data-action="number">7</button>
            <button class="btn" data-action="number">8</button>
            <button class="btn" data-action="number">9</button>
            <button class="btn operator" data-action="operator">×</button>

            <button class="btn" data-action="number">4</button>
            <button class="btn" data-action="number">5</button>
            <button class="btn" data-action="number">6</button>
            <button class="btn operator" data-action="operator">−</button>

            <button class="btn" data-action="number">1</button>
            <button class="btn" data-action="number">2</button>
            <button class="btn" data-action="number">3</button>
            <button class="btn operator" data-action="operator">+</button>

            <button class="btn zero" data-action="number">0</button>
            <button class="btn" data-action="decimal">.</button>
            <button class="btn equals" data-action="equals">=</button>
        </div>
    </div>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker error:', err));
            });
        }

        // Calculator logic
        let currentInput = '';
        let previousOperand = null;
        let pendingOperator = null;
        let shouldResetInput = false;
        let lastActionWasEquals = false;

        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');

        function updateDisplay() {
            resultEl.textContent = currentInput || '0';
            
            let expr = '';
            if (previousOperand !== null) {
                expr += previousOperand;
                if (pendingOperator) expr += ' ' + pendingOperator + ' ';
                if (currentInput && !shouldResetInput) expr += currentInput;
            } else {
                expr = currentInput;
            }
            expressionEl.textContent = expr || '';
        }

        function calculate(a, b, operator) {
            a = parseFloat(a);
            b = parseFloat(b);
            if (isNaN(a) || isNaN(b)) return NaN;
            
            switch(operator) {
                case '+': return a + b;
                case '−': return a - b;
                case '×': return a * b;
                case '÷': return b !== 0 ? a / b : 'Error';
                default: return b;
            }
        }

        function performOperation() {
            if (previousOperand !== null && pendingOperator && currentInput) {
                const result = calculate(previousOperand, currentInput, pendingOperator);
                currentInput = result.toString();
                previousOperand = currentInput;
                pendingOperator = null;
                shouldResetInput = true;
            }
        }

        // Event listeners for buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                const value = btn.textContent;

                switch(action) {
                    case 'number':
                        if (lastActionWasEquals) {
                            currentInput = '';
                            previousOperand = null;
                            lastActionWasEquals = false;
                        }
                        if (shouldResetInput) {
                            currentInput = '';
                            shouldResetInput = false;
                        }
                        if (currentInput === '0') currentInput = value;
                        else currentInput += value;
                        break;

                    case 'decimal':
                        if (!currentInput.includes('.')) {
                            if (currentInput === '') currentInput = '0.';
                            else currentInput += '.';
                        }
                        break;

                    case 'operator':
                        if (pendingOperator && !shouldResetInput && currentInput) {
                            performOperation();
                        }
                        if (currentInput || previousOperand) {
                            if (!previousOperand && currentInput) {
                                previousOperand = currentInput;
                            }
                            pendingOperator = value;
                            shouldResetInput = true;
                            lastActionWasEquals = false;
                            currentInput = '';
                        }
                        break;

                    case 'equals':
                        if (previousOperand && pendingOperator && currentInput) {
                            performOperation();
                            lastActionWasEquals = true;
                            shouldResetInput = true;
                        }
                        break;

                    case 'clear':
                        currentInput = '';
                        previousOperand = null;
                        pendingOperator = null;
                        shouldResetInput = false;
                        lastActionWasEquals = false;
                        break;

                    case 'sign':
                        if (currentInput) {
                            currentInput = (parseFloat(currentInput) * -1).toString();
                        }
                        break;

                    case 'percent':
                        if (currentInput) {
                            currentInput = (parseFloat(currentInput) / 100).toString();
                        }
                        break;
                }
                updateDisplay();
            });
        });

        // Installation logic
        let deferredPrompt;
        const installButton = document.getElementById('installButton');
        const installStatus = document.getElementById('installStatus');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installButton.classList.remove('hidden');
            installStatus.textContent = '✓ Ready to install';
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) {
                installStatus.textContent = 'Already installed or not available';
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                installStatus.textContent = '🎉 Installing...';
                installButton.classList.add('hidden');
            } else {
                installStatus.textContent = '✗ Installation canceled';
            }
            
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installStatus.textContent = '✅ App installed successfully!';
            installButton.classList.add('hidden');
        });
    </script>
</body>
</html>
