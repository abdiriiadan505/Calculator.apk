<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple PWA Calculator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196f3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        
        .calculator {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .install-btn {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .install-btn.hidden {
            display: none;
        }
        
        .display {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: right;
        }
        
        #result {
            font-size: 36px;
            font-weight: 500;
            color: #333;
            min-height: 54px;
        }
        
        #expression {
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 18px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: #f8f9fa;
            color: #333;
            cursor: pointer;
            transition: 0.1s;
        }
        
        button:active {
            background: #e9ecef;
            transform: scale(0.95);
        }
        
        .operator {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: bold;
        }
        
        .equals {
            background: #2196f3;
            color: white;
            grid-column: span 2;
        }
        
        .clear {
            background: #ffebee;
            color: #c62828;
        }
        
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>
            Simple Calc
            <button id="installBtn" class="install-btn">
                <span>📲</span> Install
            </button>
        </h1>
        
        <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="toggleSign()">±</button>
            <button class="operator" onclick="percent()">%</button>
            <button class="operator" onclick="addOperator('/')">÷</button>
            
            <button onclick="addNumber('7')">7</button>
            <button onclick="addNumber('8')">8</button>
            <button onclick="addNumber('9')">9</button>
            <button class="operator" onclick="addOperator('*')">×</button>
            
            <button onclick="addNumber('4')">4</button>
            <button onclick="addNumber('5')">5</button>
            <button onclick="addNumber('6')">6</button>
            <button class="operator" onclick="addOperator('-')">−</button>
            
            <button onclick="addNumber('1')">1</button>
            <button onclick="addNumber('2')">2</button>
            <button onclick="addNumber('3')">3</button>
            <button class="operator" onclick="addOperator('+')">+</button>
            
            <button class="zero" onclick="addNumber('0')">0</button>
            <button onclick="addDecimal()">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // Calculator logic
        let currentInput = '';
        let previousInput = '';
        let operation = null;
        
        function updateDisplay() {
            document.getElementById('result').textContent = currentInput || '0';
            if (previousInput && operation) {
                document.getElementById('expression').textContent = `${previousInput} ${operation} ${currentInput || ''}`;
            } else {
                document.getElementById('expression').textContent = '';
            }
        }
        
        function addNumber(num) {
            if (currentInput.length < 12) {
                currentInput += num;
                updateDisplay();
            }
        }
        
        function addDecimal() {
            if (!currentInput.includes('.')) {
                currentInput = currentInput ? currentInput + '.' : '0.';
                updateDisplay();
            }
        }
        
        function addOperator(op) {
            if (currentInput) {
                if (previousInput && operation) calculate();
                previousInput = currentInput;
                operation = op;
                currentInput = '';
                updateDisplay();
            }
        }
        
        function calculate() {
            if (!previousInput || !currentInput || !operation) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            
            switch(operation) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': result = curr !== 0 ? prev / curr : 'Error'; break;
                default: return;
            }
            
            if (result === 'Error') {
                currentInput = 'Error';
            } else {
                currentInput = result.toString();
            }
            previousInput = '';
            operation = null;
            updateDisplay();
        }
        
        function clearAll() {
            currentInput = '';
            previousInput = '';
            operation = null;
            updateDisplay();
        }
        
        function toggleSign() {
            if (currentInput) {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }
        
        function percent() {
            if (currentInput) {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        // PWA Installation
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBtn.classList.add('hidden');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
            
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
