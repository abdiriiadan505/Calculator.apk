<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/2196f3/ffffff?text=Calc">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
        }

        /* Install Button */
        #installBtn {
            width: 100%;
            padding: 12px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }

        #installBtn:hover {
            background: #1976d2;
        }

        #installBtn.show {
            display: flex;
        }

        .install-icon {
            font-size: 20px;
        }

        #installStatus {
            text-align: center;
            margin-bottom: 15px;
            color: #666;
            font-size: 14px;
            min-height: 20px;
        }

        /* Display */
        .display {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
        }

        #expression {
            color: #666;
            font-size: 16px;
            min-height: 24px;
            word-wrap: break-word;
        }

        #result {
            color: #333;
            font-size: 36px;
            font-weight: bold;
            margin-top: 10px;
            word-wrap: break-word;
        }

        /* Buttons */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:active {
            transform: scale(0.95);
            background: #e0e0e0;
        }

        .operator {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: bold;
        }

        .operator:active {
            background: #bbdefb;
        }

        .equals {
            background: #2196f3;
            color: white;
            grid-column: span 2;
        }

        .equals:active {
            background: #1976d2;
        }

        .clear {
            background: #ffebee;
            color: #c62828;
        }

        .clear:active {
            background: #ffcdd2;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Install Button -->
        <button id="installBtn" class="show">
            <span class="install-icon">📲</span>
            Install App
        </button>
        <div id="installStatus"></div>

        <!-- Display -->
        <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="toggleSign()">±</button>
            <button class="operator" onclick="percent()">%</button>
            <button class="operator" onclick="addOperator('÷')">÷</button>
            
            <button onclick="addNumber('7')">7</button>
            <button onclick="addNumber('8')">8</button>
            <button onclick="addNumber('9')">9</button>
            <button class="operator" onclick="addOperator('×')">×</button>
            
            <button onclick="addNumber('4')">4</button>
            <button onclick="addNumber('5')">5</button>
            <button onclick="addNumber('6')">6</button>
            <button class="operator" onclick="addOperator('−')">−</button>
            
            <button onclick="addNumber('1')">1</button>
            <button onclick="addNumber('2')">2</button>
            <button onclick="addNumber('3')">3</button>
            <button class="operator" onclick="addOperator('+')">+</button>
            
            <button class="zero" onclick="addNumber('0')">0</button>
            <button onclick="addDecimal()">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // Calculator variables
        let currentInput = '';
        let previousInput = '';
        let operation = null;

        // Display elements
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');

        // Update display
        function updateDisplay() {
            resultEl.textContent = currentInput || '0';
            if (previousInput && operation) {
                expressionEl.textContent = `${previousInput} ${operation} ${currentInput || ''}`;
            } else {
                expressionEl.textContent = '';
            }
        }

        // Add number
        function addNumber(num) {
            if (currentInput.length < 15) {
                currentInput += num;
                updateDisplay();
            }
        }

        // Add decimal
        function addDecimal() {
            if (!currentInput.includes('.')) {
                currentInput += currentInput ? '.' : '0.';
                updateDisplay();
            }
        }

        // Add operator
        function addOperator(op) {
            if (currentInput) {
                if (previousInput && operation) {
                    calculate();
                }
                previousInput = currentInput;
                operation = op;
                currentInput = '';
                updateDisplay();
            } else if (previousInput) {
                operation = op;
                updateDisplay();
            }
        }

        // Calculate
        function calculate() {
            if (!previousInput || !currentInput || !operation) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            
            switch(operation) {
                case '+': result = prev + curr; break;
                case '−': result = prev - curr; break;
                case '×': result = prev * curr; break;
                case '÷': result = curr !== 0 ? prev / curr : 'Error'; break;
                default: return;
            }
            
            if (result === 'Error') {
                currentInput = 'Error';
                previousInput = '';
                operation = null;
            } else {
                currentInput = result.toString();
                previousInput = '';
                operation = null;
            }
            updateDisplay();
        }

        // Clear all
        function clearAll() {
            currentInput = '';
            previousInput = '';
            operation = null;
            updateDisplay();
        }

        // Toggle sign
        function toggleSign() {
            if (currentInput) {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        // Percent
        function percent() {
            if (currentInput) {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        // PWA Installation
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const installStatus = document.getElementById('installStatus');

        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBtn.style.display = 'none';
            installStatus.textContent = '✓ App is installed';
        }

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
            installStatus.textContent = 'Ready to install!';
        });

        // Handle install button click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) {
                installStatus.textContent = 'Already installed or not available';
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                installStatus.textContent = 'Installing...';
                installBtn.style.display = 'none';
            } else {
                installStatus.textContent = 'Installation cancelled';
            }
            
            deferredPrompt = null;
        });

        // Handle successful install
        window.addEventListener('appinstalled', () => {
            installStatus.textContent = '✓ Installed successfully!';
            installBtn.style.display = 'none';
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker error:', err));
            });
        }
    </script>
</body>
                                                </html>
