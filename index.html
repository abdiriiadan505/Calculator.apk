<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Premium Calc">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            width: 100%;
            max-width: 400px;
        }

        /* Header with installation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        .logo-text {
            font-weight: 600;
            font-size: 18px;
            color: #2d3748;
        }

        .badge {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(72, 187, 120, 0.3);
        }

        #installBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
        }

        #installBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        #installBtn:active {
            transform: translateY(0);
        }

        #installBtn.hidden {
            display: none;
        }

        .install-icon {
            font-size: 18px;
        }

        #installMessage {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        #installMessage.show {
            display: block;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Display */
        .display {
            background: #f7fafc;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: right;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        #expression {
            color: #718096;
            font-size: 16px;
            min-height: 24px;
            word-wrap: break-word;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        #result {
            color: #2d3748;
            font-size: 48px;
            font-weight: 700;
            word-wrap: break-word;
            line-height: 1.2;
            font-family: 'Courier New', monospace;
        }

        /* Buttons grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 20px 10px;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s;
            background: #edf2f7;
            color: #2d3748;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn:active {
            transform: scale(0.95);
            background: #e2e8f0;
        }

        .btn-number {
            background: #ffffff;
            color: #2d3748;
        }

        .btn-number:active {
            background: #f7fafc;
        }

        .btn-operator {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
        }

        .btn-operator:active {
            opacity: 0.9;
            transform: scale(0.95);
        }

        .btn-equals {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            font-weight: 600;
            grid-column: span 2;
        }

        .btn-equals:active {
            opacity: 0.9;
        }

        .btn-clear {
            background: #fc8181;
            color: white;
            font-weight: 600;
        }

        .btn-clear:active {
            background: #f56565;
        }

        .btn-zero {
            grid-column: span 2;
        }

        .btn-special {
            background: #cbd5e0;
            color: #2d3748;
        }

        /* History panel */
        .history {
            background: #f7fafc;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .history-title {
            color: #718096;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .history-list {
            max-height: 100px;
            overflow-y: auto;
            font-size: 14px;
            color: #4a5568;
        }

        .history-item {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #a0aec0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Header with install button -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">C</div>
                <span class="logo-text">Premium Calc</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="badge" id="appStatus">Web</span>
                <button id="installBtn">
                    <span class="install-icon">📲</span>
                    Install
                </button>
            </div>
        </div>
        
        <!-- Install message -->
        <div id="installMessage"></div>

        <!-- Display -->
        <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-operator" onclick="toggleSign()">±</button>
            <button class="btn btn-operator" onclick="percent()">%</button>
            <button class="btn btn-operator" onclick="addOperator('÷')">÷</button>
            
            <button class="btn btn-number" onclick="addNumber('7')">7</button>
            <button class="btn btn-number" onclick="addNumber('8')">8</button>
            <button class="btn btn-number" onclick="addNumber('9')">9</button>
            <button class="btn btn-operator" onclick="addOperator('×')">×</button>
            
            <button class="btn btn-number" onclick="addNumber('4')">4</button>
            <button class="btn btn-number" onclick="addNumber('5')">5</button>
            <button class="btn btn-number" onclick="addNumber('6')">6</button>
            <button class="btn btn-operator" onclick="addOperator('−')">−</button>
            
            <button class="btn btn-number" onclick="addNumber('1')">1</button>
            <button class="btn btn-number" onclick="addNumber('2')">2</button>
            <button class="btn btn-number" onclick="addNumber('3')">3</button>
            <button class="btn btn-operator" onclick="addOperator('+')">+</button>
            
            <button class="btn btn-number btn-zero" onclick="addNumber('0')">0</button>
            <button class="btn btn-number" onclick="addDecimal()">.</button>
            <button class="btn btn-equals" onclick="calculate()">=</button>
        </div>

        <!-- History -->
        <div class="history">
            <div class="history-title">History</div>
            <div class="history-list" id="history"></div>
        </div>

        <div class="footer">
            Press C to clear · Works offline
        </div>
    </div>

    <script>
        // Calculator state
        let currentInput = '';
        let previousInput = '';
        let operation = null;
        let shouldResetScreen = false;
        let history = JSON.parse(localStorage.getItem('calcHistory')) || [];

        // DOM elements
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        const appStatus = document.getElementById('appStatus');
        const historyEl = document.getElementById('history');

        // Initialize
        updateDisplay();
        updateHistory();

        // Update display
        function updateDisplay() {
            resultEl.textContent = currentInput || '0';
            
            if (previousInput && operation) {
                expressionEl.textContent = `${previousInput} ${operation} ${currentInput || ''}`;
            } else if (previousInput && !operation) {
                expressionEl.textContent = previousInput;
            } else {
                expressionEl.textContent = '';
            }
        }

        // Update history
        function updateHistory() {
            historyEl.innerHTML = '';
            if (history.length === 0) {
                historyEl.innerHTML = '<div class="history-item">No calculations yet</div>';
                return;
            }
            
            history.slice(-5).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${item.expression}</span><span>= ${item.result}</span>`;
                historyEl.appendChild(div);
            });
        }

        // Add to history
        function addToHistory(expression, result) {
            history.push({ expression, result, timestamp: Date.now() });
            if (history.length > 20) history.shift();
            localStorage.setItem('calcHistory', JSON.stringify(history));
            updateHistory();
        }

        // Add number
        function addNumber(num) {
            if (currentInput.length >= 15) return;
            
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = num;
                shouldResetScreen = false;
            } else if (currentInput === 'Error') {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        // Add decimal
        function addDecimal() {
            if (shouldResetScreen || currentInput === 'Error') {
                currentInput = '0.';
                shouldResetScreen = false;
                updateDisplay();
                return;
            }
            
            if (!currentInput.includes('.')) {
                currentInput = currentInput ? currentInput + '.' : '0.';
                updateDisplay();
            }
        }

        // Add operator
        function addOperator(op) {
            if (currentInput === 'Error') {
                clearAll();
            }
            
            if (previousInput && operation && currentInput) {
                calculate();
            }
            
            if (currentInput) {
                previousInput = currentInput;
                operation = op;
                currentInput = '';
                shouldResetScreen = false;
            } else if (previousInput) {
                operation = op;
            }
            updateDisplay();
        }

        // Calculate
        function calculate() {
            if (!previousInput || !currentInput || !operation) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            const expression = `${previousInput} ${operation} ${currentInput}`;
            
            switch(operation) {
                case '+': result = prev + curr; break;
                case '−': result = prev - curr; break;
                case '×': result = prev * curr; break;
                case '÷': 
                    if (curr === 0) {
                        result = 'Error';
                    } else {
                        result = prev / curr;
                    }
                    break;
                default: return;
            }
            
            if (result === 'Error') {
                currentInput = 'Error';
                previousInput = '';
                operation = null;
            } else {
                // Format result
                if (result.toString().includes('.')) {
                    result = parseFloat(result.toFixed(10));
                    // Remove trailing zeros
                    result = parseFloat(result.toString());
                }
                
                // Handle large numbers
                if (result.toString().length > 15) {
                    result = result.toExponential(5);
                }
                
                currentInput = result.toString();
                previousInput = '';
                operation = null;
                shouldResetScreen = true;
                
                // Add to history
                addToHistory(expression, result);
            }
            updateDisplay();
        }

        // Clear all
        function clearAll() {
            currentInput = '';
            previousInput = '';
            operation = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        // Toggle sign
        function toggleSign() {
            if (currentInput && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        // Percent
        function percent() {
            if (currentInput && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        // Clear history
        function clearHistory() {
            history = [];
            localStorage.removeItem('calcHistory');
            updateHistory();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNumber(e.key);
            if (e.key === '.') addDecimal();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                e.preventDefault();
                let op = e.key;
                if (op === '*') op = '×';
                if (op === '/') op = '÷';
                addOperator(op);
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            }
            if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearAll();
            }
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (currentInput && currentInput !== 'Error') {
                    currentInput = currentInput.slice(0, -1);
                    updateDisplay();
                }
            }
            if (e.key === 'h' || e.key === 'H') {
                clearHistory();
            }
        });

        // PWA Installation
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const installMessage = document.getElementById('installMessage');

        // Check if running as installed app
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
            appStatus.textContent = 'Installed ✓';
            installBtn.classList.add('hidden');
        }

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Only show if not already installed
            if (!window.matchMedia('(display-mode: standalone)').matches && 
                !window.navigator.standalone) {
                installBtn.classList.remove('hidden');
            }
        });

        // Handle install button
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) {
                showMessage('Already installed or not supported', 'error');
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                showMessage('✓ Installing...', 'success');
                installBtn.classList.add('hidden');
            } else {
                showMessage('Installation cancelled', 'error');
            }
            
            deferredPrompt = null;
        });

        // Handle successful install
        window.addEventListener('appinstalled', () => {
            appStatus.textContent = 'Installed ✓';
            installBtn.classList.add('hidden');
            showMessage('✓ App installed successfully!', 'success');
        });

        // Show message
        function showMessage(text, type) {
            installMessage.textContent = text;
            installMessage.style.background = type === 'success' ? '#c6f6d5' : '#fed7d7';
            installMessage.style.color = type === 'success' ? '#22543d' : '#c53030';
            installMessage.classList.add('show');
            setTimeout(() => installMessage.classList.remove('show'), 3000);
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.log('❌ Service Worker error:', err));
            });
        }
    </script>
</body>
</html>
